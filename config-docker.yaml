# TeamClaw unified configuration
app:
  name: "teamclaw-backend"
  # UI/API locale: "en" (English, default) or "zh" (Chinese)
  locale: "en"
  env: "development"
  host: "0.0.0.0"
  port: 8000
  debug: true
  frontend_base_url: "http://localhost:8080/frontend"

# Auth settings
auth:
  # Dev-only: when enabled, forgot-password returns the verification code and reset token.
  expose_password_reset_debug: false

# PostgreSQL connection
database:
  host: "postgres"
  port: 5432
  user: "teamclaw"
  password: "teamclaw_dev_password"
  name: "teamclaw"

# Skills
skills:
  enabled: true
  directories:
    - "./skills-builtin"

# Skill storage directories
skill_storage:
  userskills_dir: "./skills/user"
  preskills_dir: "./skills/prepublish"
  skills_dir: "./skills/published"
  agentskills_dir: "./skills/agent"
  conversationskills_dir: "./skills/conversation"

# Agent behavior
agent:
  interrupt_on:
    write_file: true
    edit_file: true
    terminal: true

# Docker container
docker:
  enabled: true
  image: "python:3.12-slim"
  container_name_prefix: "teamclaw-exec"
  workspace_root: "./workspaces"
  # Remote Docker daemon (dind) settings
  daemon_hosts:
    - name: "dind-0"
      host: "tcp://docker-0.docker:2376"
    - name: "dind-1"
      host: "tcp://docker-1.docker:2376"
  daemon_workspace_root: "/workspaces"
  tls:
    enabled: true
    certs_dir: "./certs"
    ca_cert: "./certs/ca.crt"
    client_cert: "./certs/tls.crt"
    client_key: "./certs/tls.key"
    verify: true
  workdir: "/workspace"
  readonly_workdir: false
  auto_remove: true
  timeout: 300
  client_timeout: 10
  environment:
    - "PYTHONUNBUFFERED=1"
