      # api_key: "sk-xxxx"
      #
      # # Ali Dashscope coding (paid):
      # base_url: "https://coding.dashscope.aliyuncs.com/v1"
      # api_key: "sk-sp-86d129e98f964d679c5bc198cbb06f81"
      # models:
      #   - "qwen3.5-plus"
      #   - "qwen3-max-2026-01-23"
      #   - "qwen3-coder-next"
      #   - "qwen3-coder-plus"
      #   - "MiniMax-M2.5"
      #   - "glm-5"
      #   # - "gpt-4.1"
      #   # - "gpt-4o"
      #   # - "gpt-5"
      # params:
      #   temperature: 0
      #   max_tokens: 4096
      #   qwen3.5-plus:
      #     temperature: 0.7
      # #
      # GMCC MaaS:
      base_url: "http://example.com/v1"
      api_key: "xxxx"
      models:
        - "qwen3.5-plus"
      params:
        temperature: 0
        max_tokens: 4096
        qwen3.5-plus:
          temperature: 0.7
      

